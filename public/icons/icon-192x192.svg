    <!-- Box inside house -->
    <rect x="-20" y="5" width="40" height="30" rx="4" fill="#16a34a" opacity="0.8"/>
    <line x1="-20" y1="15" x2="20" y2="15" stroke="white" stroke-width="2"/>
    <line x1="-5" y1="5" x2="-5" y2="15" stroke="white" stroke-width="2"/>
    <line x1="5" y1="5" x2="5" y2="15" stroke="white" stroke-width="2"/>
  </g>
</svg>
